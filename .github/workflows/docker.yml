# Build the serving image (root Dockerfile) and push to GHCR — free for public images.
#   - version tag  v1.2.3        -> :1.2.3, :1.2, :sha            (releases)
#   - push to main / development -> :<branch>, :sha, + :latest    (continuous)
#   - workflow_dispatch          -> manual run
#
# No `paths:` filter: it is unreliable on tag pushes (can silently skip a release
# build), and unrelated pushes hit the layer cache and cost little.
on:
  push:
    tags: ["v*"]
    branches: [main, development]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io with the built-in token
    steps:
      - uses: actions/checkout@v4 # full checkout: the Dockerfile copies feed/, webapp/, config/, docker/ + pyproject/uv.lock from the repo root

      - uses: docker/setup-qemu-action@v3 # binfmt for the linux/arm64 cross-build
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            # :latest tracks main HEAD. To make it track the newest release tag instead, swap for:
            #   type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
